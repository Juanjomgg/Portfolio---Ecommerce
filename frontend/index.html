<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Login y Pedidos - Django Ninja API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .container {
      background: #fff;
      margin-top: 3em;
      padding: 2em 2.5em;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 100%;
    }
    h1, h2 {
      text-align: center;
      color: #2d3a4b;
    }
    input, button {
      width: 100%;
      padding: 0.7em;
      margin: 0.5em 0;
      border-radius: 6px;
      border: 1px solid #cfd8dc;
      font-size: 1em;
      box-sizing: border-box;
    }
    button {
      background: #1976d2;
      color: #fff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1565c0;
    }
    .error {
      color: #d32f2f;
      margin-top: 0.5em;
      font-size: 0.95em;
    }
    .success {
      color: #388e3c;
      margin-top: 0.5em;
      font-size: 0.95em;
    }
    #user-info {
      text-align: center;
      margin-bottom: 1em;
      color: #1976d2;
      font-weight: bold;
    }
    @media (max-width: 500px) {
      .container { padding: 1em 0.5em; }
      h1 { font-size: 1.3em; }
      h2 { font-size: 1.1em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Demo Login y Creación de Pedidos</h1>
    <div id="user-info" style="display:none;"></div>
    <div id="login-form">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" required autocomplete="username">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <button onclick="login()">Iniciar sesión</button>
      <div id="login-error" class="error"></div>
    </div>
    <div id="pedido-form" style="display:none;">
      <h2>Crear Pedido</h2>
      <label>IDs de productos (separados por coma):</label>
      <input type="text" id="productos" placeholder="Ej: 1,2,3">
      <label>Cantidades (separadas por coma):</label>
      <input type="text" id="cantidades" placeholder="Ej: 2,1,5">
      <button onclick="crearPedido()">Crear Pedido</button>
      <div id="pedido-error" class="error"></div>
      <div id="pedido-success" class="success"></div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
